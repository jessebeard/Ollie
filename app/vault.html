<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollie Vault</title>
    <link rel="stylesheet" href="components/vault/vault.css">

<body>
    <div class="vault-app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 style="display: flex; align-items: center; gap: 0.5rem;">
                <img src="components/assets/ollie-icon.svg" alt="Ollie Vault Logo" width="32" height="32"
                    style="border-radius: 8px;">
                Ollie Vault
            </h2>

            <div class="nav-group">
                <button class="btn btn-secondary w-full" id="createBtn" style="width:100%; margin-bottom: 0.5rem"
                    aria-label="Create a new Vault">✨ New Base Vault</button>
                <button class="btn btn-secondary w-full" id="saveBtn" style="width:100%; margin-bottom: 0.5rem"
                    aria-label="Save current vault to JPEGs">💾 Save To JPEGs</button>
                <button class="btn btn-secondary w-full" id="importBtn"
                    style="width:100%; margin-bottom: 0.5rem; display: none;" aria-label="Import plaintext JSON data">📥
                    Import JSON</button>
                <button class="btn btn-secondary w-full" id="exportBtn" style="width:100%; display: none;"
                    aria-label="Export vault to plaintext JSON">📤 Export (Plaintext)</button>
            </div>

            <div style="margin-top: 2rem" aria-label="Filter by tags">
                <h4 style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase;">Tags</h4>
                <div id="tagList" style="margin-top: 1rem" role="group" aria-label="Available Tags">
                    <!-- Tags populated here -->
                </div>
            </div>
        </aside>

        <!-- Main Content (Drop Zone) -->
        <main class="drop-zone" id="dropZone">
            <header class="app-header">
                <div class="header-controls">
                    <div class="status-badge" aria-live="polite">
                        <span class="status-dot"></span>
                        <span id="statusText">Locked</span>
                    </div>
                </div>

                <div class="header-controls">
                    <input type="search" id="searchInput" class="search-input" placeholder="Search..."
                        aria-label="Search items by title, username, or URL">
                    <select id="sortSelect" class="sort-select" aria-label="Sort Entries">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="az">A-Z Name</option>
                        <option value="za">Z-A Name</option>
                    </select>
                    <button class="btn btn-primary" id="addBtn" aria-label="Add a new entry">➕ Add Entry</button>
                </div>
            </header>

            <div id="vaultList">
                <div class="empty-state">
                    <div class="empty-icon">
                        <img src="components/assets/ollie-animated.svg" alt="Ollie the Maine Coon Mascot" width="120"
                            height="120" />
                    </div>
                    <h3>Drop Vault Here</h3>
                    <p>Drag and drop a folder of images to load your vault.</p>
                </div>
            </div>

            <div class="status-bar"
                style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted);"
                role="status" aria-live="polite">
                <span id="itemCount">0 Items</span>
                <span>Ollie v2.0 (Secure)</span>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay"
        style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; color: white;">
        <div style="margin-bottom: 1rem;">
            <img src="components/assets/ollie-thinking.svg" alt="Ollie Thinking" width="100" height="100">
        </div>
        <p>Processing...</p>
    </div>

    <script type="module" src="components/vault/vault-ui.js"></script>
</body>

</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Background Gradient for Apple HIG Icon Look -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Maine Coon Fur Texture Base -->
    <radialGradient id="furGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a4b42" />
      <stop offset="60%" stop-color="#4d3f36" />
      <stop offset="100%" stop-color="#3a2e26" />
    </radialGradient>
    <linearGradient id="bibGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <!-- Glossy HIG Highlight -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Drop Shadow -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- App Icon Background squircle -->
  <rect x="10" y="10" width="180" height="180" rx="42" fill="url(#bgGradient)" filter="url(#dropShadow)" />

  <!-- Scale slightly up and center Ollie inside the squircle -->
  <g transform="translate(10, -5) scale(0.9)">
    <!-- Ears -->
    <path d="M40 70 L20 20 L80 40 Z" fill="url(#furGradient)" stroke="#1a120b" stroke-width="2" stroke-linejoin="round"/>
    <path d="M160 70 L180 20 L120 40 Z" fill="url(#furGradient)" stroke="#1a120b" stroke-width="2" stroke-linejoin="round"/>
    <path d="M45 60 L30 35 L65 45 Z" fill="#ebcfc4" />
    <path d="M155 60 L170 35 L135 45 Z" fill="#ebcfc4" />

    <!-- Head -->
    <path d="M50 70 Q20 100, 30 140 Q70 170, 100 170 Q130 170, 170 140 Q180 100, 150 70 Q100 40, 50 70" fill="url(#furGradient)" stroke="#1a120b" stroke-width="3" />

    <!-- White Bib -->
    <path d="M60 150 Q100 200, 140 150 Q170 180, 150 210 Q100 230, 50 210 Q30 180, 60 150" fill="url(#bibGradient)" />

    <!-- Left Eye (Yellow) -->
    <path d="M60 100 Q75 85, 90 100 Q75 110, 60 100" fill="#fde047" stroke="#000" stroke-width="2" />
    <circle cx="75" cy="98" r="4" fill="#000" />
    <circle cx="73" cy="95" r="2.5" fill="#fff" /> 
    <circle cx="77" cy="100" r="1" fill="#fff" /> 

    <!-- Right Eye (Green) -->
    <path d="M110 100 Q125 85, 140 100 Q125 110, 110 100" fill="#86efac" stroke="#000" stroke-width="2" />
    <circle cx="125" cy="98" r="4" fill="#000" />
    <circle cx="123" cy="95" r="2.5" fill="#fff" /> 
    <circle cx="127" cy="100" r="1" fill="#fff" /> 

    <!-- Nose & Mouth -->
    <path d="M90 120 Q100 130, 110 120 Z" fill="#fca5a5" />
    <path d="M100 130 Q100 140, 85 135" fill="none" stroke="#1a120b" stroke-width="2" stroke-linecap="round" />
    <path d="M100 130 Q100 140, 115 135" fill="none" stroke="#1a120b" stroke-width="2" stroke-linecap="round" />

    <!-- Whiskers -->
    <path d="M30 115 L10 110 M30 125 L5 125 M30 135 L10 140" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M170 115 L190 110 M170 125 L195 125 M170 135 L190 140" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- HIG Glass Gloss overlay over the icon -->
  <rect x="10" y="10" width="180" height="90" rx="42" fill="url(#glassHighlight)" />

</svg>

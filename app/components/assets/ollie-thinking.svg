<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Fur & Bib Gradients -->
    <radialGradient id="furGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a3b32" />
      <stop offset="60%" stop-color="#3d2f26" />
      <stop offset="100%" stop-color="#2a1e16" />
    </radialGradient>
    <linearGradient id="bibGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
  </defs>

  <g id="ollie-body">
    <!-- Ears -->
    <g id="left-ear">
      <path d="M40 70 L20 20 L80 40 Z" fill="url(#furGradient)" stroke="#1a120b" stroke-width="2" stroke-linejoin="round"/>
      <path d="M45 60 L30 35 L65 45 Z" fill="#ebcfc4" />
      <!-- Twitch animation -->
      <animateTransform attributeName="transform" type="rotate" values="0 40 70; -30 40 70; 0 40 70; 0 40 70" keyTimes="0; 0.1; 0.2; 1" dur="3s" repeatCount="indefinite" additive="sum"/>
    </g>
    <g id="right-ear">
      <path d="M160 70 L180 20 L120 40 Z" fill="url(#furGradient)" stroke="#1a120b" stroke-width="2" stroke-linejoin="round"/>
      <path d="M155 60 L170 35 L135 45 Z" fill="#ebcfc4" />
    </g>

    <!-- Head -->
    <path d="M50 70 Q20 100, 30 140 Q70 170, 100 170 Q130 170, 170 140 Q180 100, 150 70 Q100 40, 50 70" fill="url(#furGradient)" stroke="#1a120b" stroke-width="3" />

    <!-- White Bib -->
    <path d="M60 150 Q100 200, 140 150 Q170 180, 150 210 Q100 230, 50 210 Q30 180, 60 150" fill="url(#bibGradient)" />

    <!-- Thinking Eyes (Looking side to side) -->
    <!-- Left Eye (Yellow) -->
    <g id="left-eye">
      <path d="M60 100 Q75 85, 90 100 Q75 110, 60 100" fill="#facc15" stroke="#000" stroke-width="2" />
      <g>
        <circle cx="75" cy="98" r="4" fill="#000">
            <animate attributeName="cx" values="75; 82; 68; 75" keyTimes="0; 0.3; 0.7; 1" dur="2s" repeatCount="indefinite" />
        </circle>
        <circle cx="72" cy="95" r="2" fill="#fff">
            <animate attributeName="cx" values="72; 79; 65; 72" keyTimes="0; 0.3; 0.7; 1" dur="2s" repeatCount="indefinite" />
        </circle>
      </g>
    </g>

    <!-- Right Eye (Green) -->
    <g id="right-eye">
      <path d="M110 100 Q125 85, 140 100 Q125 110, 110 100" fill="#4ade80" stroke="#000" stroke-width="2" />
      <g>
        <circle cx="125" cy="98" r="4" fill="#000">
            <animate attributeName="cx" values="125; 132; 118; 125" keyTimes="0; 0.3; 0.7; 1" dur="2s" repeatCount="indefinite" />
        </circle>
        <circle cx="122" cy="95" r="2" fill="#fff">
            <animate attributeName="cx" values="122; 129; 115; 122" keyTimes="0; 0.3; 0.7; 1" dur="2s" repeatCount="indefinite" />
        </circle>
      </g>
    </g>

    <!-- Nose & Mouth (Hmm shape) -->
    <path d="M90 120 Q100 130, 110 120 Z" fill="#fca5a5" />
    <path d="M95 135 L105 135" fill="none" stroke="#1a120b" stroke-width="2" stroke-linecap="round" />

    <!-- Whiskers -->
    <g opacity="0.6" stroke="#fff" stroke-width="1.5" stroke-linecap="round">
      <path d="M30 115 L10 110" />
      <path d="M30 125 L5 125" />
      <path d="M30 135 L10 140" />
      <path d="M170 115 L190 110" />
      <path d="M170 125 L195 125" />
      <path d="M170 135 L190 140" />
    </g>

    <!-- Thinking bubbles -->
    <circle cx="160" cy="50" r="5" fill="#fff" opacity="0" >
      <animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.1; 0.9; 1" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="50; 40" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="170" cy="35" r="8" fill="#fff" opacity="0" >
      <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.1; 0.2; 0.9; 1" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="35; 20" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="185" cy="15" r="12" fill="#fff" opacity="0" >
      <animate attributeName="opacity" values="0; 0; 0; 1; 1; 0" keyTimes="0; 0.1; 0.2; 0.3; 0.9; 1" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="15; 0" dur="3s" repeatCount="indefinite" />
    </circle>

  </g>
</svg>
